# render.yaml
# Tells Render how to deploy your Express backend
# Place this file in your backend/ folder

services:
  - type: web
    name: prowash-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false        # You'll paste this in the Render dashboard
      - key: JWT_SECRET
        sync: false        # You'll paste this in the Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false        # You'll paste this in the Render dashboard
      - key: NODE_ENV
        value: production
